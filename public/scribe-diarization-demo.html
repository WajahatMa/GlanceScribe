<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scribe diarization demo (imported main.js)</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 42rem; margin: 2rem auto; padding: 0 1rem; background: #111; color: #eee; }
    h1 { font-size: 1rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.85rem; color: #888; margin-bottom: 1rem; }
    .row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; border-radius: 8px; border: 1px solid #444; background: #222; color: #eee; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #status { font-size: 0.85rem; color: #a78bfa; margin-bottom: 0.75rem; }
    #live { min-height: 2rem; font-size: 0.9rem; color: #ccc; margin-bottom: 1rem; padding: 0.5rem; background: #1a1a1a; border-radius: 8px; }
    #transcripts { max-height: 40vh; overflow: auto; font-size: 0.85rem; line-height: 1.4; }
    #transcripts p { margin: 0 0 0.5rem; padding-bottom: 0.5rem; border-bottom: 1px solid #333; color: #ddd; }
  </style>
</head>
<body>
  <h1>Scribe diarization demo</h1>
  <p>Uses imported <code>public/main.js</code> + ElevenLabs client (esm.sh). Needs <code>ELEVENLABS_API_KEY</code> on the server. Add <code>?debug=1</code> for console logs.</p>
  <div class="row">
    <button type="button" id="start">Start</button>
    <button type="button" id="stop" disabled>Stop</button>
    <button type="button" id="reset">Reset</button>
  </div>
  <div id="status">Idle</div>
  <div id="live"></div>
  <div id="transcripts"></div>
  <script type="module" src="/main.js"></script>
</body>
</html>
