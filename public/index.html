<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GlanceScribe — Record</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f8;
    --muted: #8888a8;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --red: #ff4d6d;
    --green: #34d399;
    --amber: #fbbf24;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px) 16px;
    gap: 12px;
    height: 100dvh;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo-text span { color: var(--accent2); }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    transition: all 0.3s;
  }

  .status-pill.recording {
    background: rgba(255, 77, 109, 0.1);
    border-color: rgba(255, 77, 109, 0.3);
    color: var(--red);
  }

  .status-pill.ready {
    background: rgba(52, 211, 153, 0.1);
    border-color: rgba(52, 211, 153, 0.3);
    color: var(--green);
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .recording .dot { animation: pulse 1s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Camera preview */
  .camera-wrap {
    flex: 1;
    min-height: 0;
    background: #000; /* letterbox background when using object-fit: contain */
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    /* Keep a consistent, phone-like viewport without extreme cropping */
    max-height: 52vh;
    aspect-ratio: 3 / 4;
  }

  #preview {
    width: 100%;
    height: 100%;
    /* Show full frame (no crop). This may letterbox but avoids "zoomed in" look. */
    object-fit: contain;
    display: block;
    /* Un-mirror camera preview (some browsers show front-cam mirrored by default). */
    transform: scaleX(-1);
  }

  /* Real-time body part overlay (MoveNet) */
  #pose-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 3;
    /* Keep labels readable; we mirror coordinates in JS when needed */
    transform: none;
  }

  .camera-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: rgba(108, 99, 255, 0.6);
    border-style: solid;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  .rec-badge {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--red);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 3px 10px;
    border-radius: 4px;
    display: none;
  }

  .rec-badge.visible { display: block; }

  .timer-badge {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    padding: 4px 12px;
    border-radius: 20px;
    display: none;
    backdrop-filter: blur(8px);
  }

  .timer-badge.visible { display: block; }

  /* Transcript preview */
  .transcript-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    flex-shrink: 0;
    height: 90px;
    overflow: hidden;
    position: relative;
  }

  .transcript-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  #transcript-preview {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }

  .transcript-empty { color: var(--muted); font-style: italic; }

  /* Controls */
  .controls {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-main {
    flex: 1;
    height: 58px;
    border: none;
    border-radius: 14px;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    letter-spacing: -0.3px;
    -webkit-tap-highlight-color: transparent;
  }

  .btn-main:active { transform: scale(0.97); }

  .btn-start {
    background: var(--accent);
    color: #fff;
  }

  .btn-stop {
    background: var(--red);
    color: #fff;
  }

  .btn-icon {
    width: 58px;
    height: 58px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
  }

  .btn-icon:active { transform: scale(0.95); background: var(--surface2); }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
  }

  .stat-val {
    font-size: 15px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 16px) + 80px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Loading overlay */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 200;
    display: none;
    backdrop-filter: blur(6px);
  }

  .loading-overlay.visible { display: flex; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 15px;
    color: var(--muted);
    text-align: center;
  }

  .loading-text strong { color: var(--text); display: block; font-size: 17px; margin-bottom: 4px; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon">👓</div>
    <div class="logo-text">Glance<span>Scribe</span></div>
  </div>
  <div class="status-pill" id="status-pill">
    <div class="dot"></div>
    <span id="status-text">Tap Start</span>
  </div>
</div>

<!-- Camera -->
<div class="camera-wrap">
  <video id="preview" autoplay playsinline muted></video>
  <canvas id="pose-canvas"></canvas>
  <div class="camera-overlay">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="rec-badge" id="rec-badge">● REC</div>
    <div class="timer-badge" id="timer-badge">00:00</div>
  </div>
</div>

<!-- Live transcript preview -->
<div class="transcript-wrap">
  <div class="transcript-label">Live Transcript</div>
  <div id="transcript-preview" class="transcript-empty">Transcript will appear here during recording…</div>
</div>

<!-- Stats -->
<div class="stats">
  <div class="stat">
    <div class="stat-val" id="stat-lines">0</div>
    <div class="stat-label">Lines</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="stat-chunks">0</div>
    <div class="stat-label">Video</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="stat-dur">0s</div>
    <div class="stat-label">Duration</div>
  </div>
</div>

<!-- Controls -->
<div class="controls">
  <button class="btn-icon" id="btn-flip" title="Flip camera">🔄</button>
  <button class="btn-main btn-start" id="btn-main">▶ Start Recording</button>
  <button class="btn-icon" id="btn-settings" title="Settings">⚙</button>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">
    <strong id="loading-title">Processing…</strong>
    <span id="loading-sub">Saving video and running AI analysis</span>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Optional: client-side ML pose (MoveNet) for real-time body-part keypoints -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  recording: false,
  mediaStream: null,
  mediaRecorder: null,
  scribeSocket: null,
  audioContext: null,
  scribeStopping: false,
  lastPartial: '',
  lastCommittedAt: 0,
  timerInterval: null,
  statsInterval: null,
  startTime: null,
  transcriptLines: [],
  videoChunks: 0,
  facingMode: 'environment', // back camera by default for Meta glasses scenario
  sessionId: null,
};

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const preview = document.getElementById('preview');
const btnMain = document.getElementById('btn-main');
const btnFlip = document.getElementById('btn-flip');
const statusPill = document.getElementById('status-pill');
const statusText = document.getElementById('status-text');
const recBadge = document.getElementById('rec-badge');
const timerBadge = document.getElementById('timer-badge');
const transcriptPreview = document.getElementById('transcript-preview');
const statLines = document.getElementById('stat-lines');
const statChunks = document.getElementById('stat-chunks');
const statDur = document.getElementById('stat-dur');
const loadingOverlay = document.getElementById('loading-overlay');
const loadingTitle = document.getElementById('loading-title');
const loadingSub = document.getElementById('loading-sub');
const toast = document.getElementById('toast');
const poseCanvas = document.getElementById('pose-canvas');

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, duration = 3000) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}

// ─── Camera init ──────────────────────────────────────────────────────────────
async function initCamera() {
  try {
    if (state.mediaStream) {
      state.mediaStream.getTracks().forEach(t => t.stop());
    }
    state.mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: state.facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: { echoCancellation: false, noiseSuppression: false, sampleRate: 16000 },
    });
    preview.srcObject = state.mediaStream;
    // Force an un-mirrored preview (counteracts default mirrored camera behavior).
    preview.style.transform = 'scaleX(-1)';
    initBodyDetection().catch(() => {});
  } catch (err) {
    showToast('⚠️ Camera access denied: ' + err.message);
    console.error(err);
  }
}

// ─── Flip camera ─────────────────────────────────────────────────────────────
btnFlip.addEventListener('click', async () => {
  if (state.recording) { showToast('Cannot flip during recording'); return; }
  state.facingMode = state.facingMode === 'environment' ? 'user' : 'environment';
  await initCamera();
  showToast(state.facingMode === 'environment' ? '📷 Back camera' : '🤳 Front camera');
});

// ─── Real-time body-part detection (MoveNet via TF.js) ────────────────────────
const BODY_PARTS = {
  nose: 'Head',
  left_elbow: 'Left Elbow',
  right_elbow: 'Right Elbow',
  left_wrist: 'Left Hand',
  right_wrist: 'Right Hand',
  left_knee: 'Left Knee',
  right_knee: 'Right Knee',
  left_ankle: 'Left Foot',
  right_ankle: 'Right Foot',
};

let poseDetector = null;
let poseLoopToken = 0;
let lastFocusLabel = null;
let focusLog = [];
let focusFlushTimer = null;

function drawBodyParts(ctx, keypoints, w, h, map) {
  ctx.clearRect(0, 0, w, h);
  // Pick a single "focused" keypoint each frame.
  // Heuristic: most centered among labeled points, with a small bias for hands/knees/ankles
  // so we don't lock onto the head at the start of the visit.
  let focusedName = null;
  let focusedScore = -1;
  const cx = w / 2;
  const cy = h / 2;
  const maxD = Math.max(1, Math.hypot(cx, cy));
  for (const kp of keypoints ?? []) {
    if (!BODY_PARTS[kp.name]) continue;
    const s = kp.score ?? 0;
    if (s < 0.3) continue;
    const kx = map?.flipX ? (map.videoW - kp.x) : kp.x;
    const ky = kp.y;
    const px = map ? (kx * map.scale + map.offX) : kx;
    const py = map ? (ky * map.scale + map.offY) : ky;
    const dx = (px ?? 0) - cx;
    const dy = (py ?? 0) - cy;
    const centered = 1 - Math.min(1, Math.hypot(dx, dy) / maxD); // 0..1
    const partBoost =
      kp.name === 'left_wrist' || kp.name === 'right_wrist'
        ? 0.18
        : (kp.name === 'left_knee' || kp.name === 'right_knee' || kp.name === 'left_ankle' || kp.name === 'right_ankle')
          ? 0.10
          : 0;
    const conf = Math.min(1, s);
    const rank = centered + partBoost + conf * 0.08;
    if (rank > focusedScore) {
      focusedScore = rank;
      focusedName = kp.name;
    }
  }

  // Capture focus changes during an active recording session.
  if (state.recording && focusedName) {
    const focusedLabel = BODY_PARTS[focusedName] ?? null;
    if (focusedLabel && focusedLabel !== lastFocusLabel) {
      lastFocusLabel = focusedLabel;
      const tMs = state.startTime ? (Date.now() - state.startTime) : 0;
      focusLog.push({
        t_ms: Math.max(0, Math.round(tMs)),
        keypoint: focusedName,
        label: focusedLabel,
        rank: Math.round(focusedScore * 1000) / 1000,
      });
    }
  }

  for (const kp of keypoints ?? []) {
    const label = BODY_PARTS[kp.name];
    if (!label) continue;
    if ((kp.score ?? 0) < 0.3) continue;

    const kx = map?.flipX ? (map.videoW - kp.x) : kp.x;
    const ky = kp.y;
    const x = map ? (kx * map.scale + map.offX) : kx;
    const y = map ? (ky * map.scale + map.offY) : ky;
    const r = 18;

    const isFocused = kp.name === focusedName;
    ctx.strokeStyle = isFocused ? '#ff3b30' : '#00FF88';
    ctx.lineWidth = isFocused ? 3 : 2;
    ctx.strokeRect(x - r, y - r, r * 2, r * 2);

    // Label pill
    ctx.font = 'bold 12px system-ui, -apple-system, sans-serif';
    const pad = 6;
    const label2 = isFocused ? `${label} (focus)` : label;
    const tw = ctx.measureText(label2).width;
    const bw = tw + pad * 2;
    const bh = 18;
    const bx = Math.max(4, Math.min(w - bw - 4, x - r));
    const by = Math.max(4, y - r - bh - 4);

    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = isFocused ? '#ff3b30' : '#00FF88';
    ctx.fillText(label2, bx + pad, by + 13);
  }
}

async function flushFocusLog() {
  if (!state.recording) return;
  if (!state.sessionId) return;
  if (!focusLog.length) return;
  const batch = focusLog;
  focusLog = [];
  try {
    await fetch('/focus', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: state.sessionId, events: batch }),
    });
  } catch {
    // If it fails (offline, server restart), keep logging locally.
    focusLog = batch.concat(focusLog);
  }
}

async function initBodyDetection() {
  // Don’t crash the app if TF.js fails to load (offline, blocked CDN, etc.)
  if (!window.poseDetection || !window.tf) return;
  if (!preview) return;

  if (!poseDetector) {
    try {
      poseDetector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
      );
    } catch (e) {
      console.warn('MoveNet init failed:', e);
      return;
    }
  }

  const token = ++poseLoopToken;
  const canvas = poseCanvas;
  const ctx = canvas.getContext('2d');

  async function tick() {
    if (token !== poseLoopToken) return;
    if (preview.readyState < 2 || preview.videoWidth === 0 || preview.videoHeight === 0) {
      requestAnimationFrame(tick);
      return;
    }

    // With object-fit: contain, the displayed video is letterboxed.
    // Draw in CSS pixels and map keypoint coords from video pixels -> displayed rect.
    const rect = canvas.getBoundingClientRect();
    const cw = Math.max(1, Math.round(rect.width));
    const ch = Math.max(1, Math.round(rect.height));
    if (canvas.width !== cw) canvas.width = cw;
    if (canvas.height !== ch) canvas.height = ch;

    const vw = preview.videoWidth;
    const vh = preview.videoHeight;
    const scale = Math.min(cw / vw, ch / vh);
    const drawW = vw * scale;
    const drawH = vh * scale;
    const offX = (cw - drawW) / 2;
    const offY = (ch - drawH) / 2;
    // Preview is flipped with CSS scaleX(-1), so mirror keypoint X to match.
    const map = { scale, offX, offY, flipX: true, videoW: vw };

    try {
      const poses = await poseDetector.estimatePoses(preview, { maxPoses: 1, flipHorizontal: false });
      if (poses?.[0]?.keypoints) {
        drawBodyParts(ctx, poses[0].keypoints, canvas.width, canvas.height, map);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    } catch (e) {
      // If it fails (e.g. WebGL context loss), just stop drawing silently.
      console.warn('MoveNet estimate failed:', e);
      return;
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

// ─── Timer ────────────────────────────────────────────────────────────────────
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${String(m).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

// Base64 for PCM bytes (required by ElevenLabs `input_audio_chunk`)
function uint8ToBase64(u8) {
  let bin = '';
  const chunk = 0x8000;
  for (let i = 0; i < u8.length; i += chunk) {
    bin += String.fromCharCode.apply(null, u8.subarray(i, i + chunk));
  }
  return btoa(bin);
}

/** Always stream 16 kHz mono PCM16 to Scribe (resampled in-browser if the mic runs at another rate). */
const SCRIBE_PCM_RATE = 16000;

/** Linear resample mono float32 [-1,1] from fromRate → toRate. */
function resampleFloat32Linear(input, fromRate, toRate) {
  if (fromRate === toRate || input.length === 0) return input;
  const ratio = toRate / fromRate;
  const outLen = Math.max(1, Math.round(input.length * ratio));
  const out = new Float32Array(outLen);
  for (let i = 0; i < outLen; i++) {
    const srcPos = (i + 0.5) / ratio - 0.5;
    const i0 = Math.floor(srcPos);
    const i1 = Math.min(i0 + 1, input.length - 1);
    const f = srcPos - i0;
    const a = input[Math.max(0, i0)];
    const b = input[i1];
    out[i] = a + (b - a) * f;
  }
  return out;
}

function float32ToInt16(float32) {
  const int16 = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++) {
    int16[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32767)));
  }
  return int16;
}

function formatScribeErr(msg) {
  const e = msg?.error ?? msg?.message_type ?? 'unknown';
  return typeof e === 'string' ? e : JSON.stringify(e);
}

// ─── Scribe WebSocket ─────────────────────────────────────────────────────────
async function startScribe() {
  try {
    const res = await fetch('/scribe-token');
    if (!res.ok) {
      const t = await res.text();
      throw new Error(t || 'scribe-token failed');
    }
    const { token } = await res.json();
    if (!token) throw new Error('No token from server');

    // API expects JSON `input_audio_chunk` + base64 PCM at the rate implied by `audio_format`.
    // We always send 16 kHz (resampled from whatever the browser AudioContext uses).
    const qs = new URLSearchParams({
      token,
      model_id: 'scribe_v2_realtime',
      commit_strategy: 'vad',
      audio_format: 'pcm_16000',
    });
    const ws = new WebSocket(`wss://api.elevenlabs.io/v1/speech-to-text/realtime?${qs.toString()}`);
    state.scribeSocket = ws;
    state.scribeAudioStarted = false;
    state.scribeStopping = false;
    state.lastPartial = '';

    const sessionWait = setTimeout(() => {
      if (!state.scribeAudioStarted) {
        console.error('Scribe: no session_started within 8s');
        showToast('⚠️ Scribe: no session (check token / network)');
        try { ws.close(); } catch (_) {}
      }
    }, 8000);

    ws.onopen = () => {
      console.log('Scribe WebSocket open; waiting for session_started…');
    };

    ws.onmessage = async (event) => {
      try {
        if (typeof event.data !== 'string') return;
        const msg = JSON.parse(event.data);

        if (msg.message_type === 'session_started') {
          console.log('Scribe session:', msg.session_id, msg.config || {});
          if (!state.scribeAudioStarted) {
            state.scribeAudioStarted = true;
            clearTimeout(sessionWait);
            startAudioPump();
          }
          return;
        }

        const errTypes = [
          'error', 'auth_error', 'quota_exceeded', 'input_error', 'transcriber_error',
          'rate_limited', 'commit_throttled', 'unaccepted_terms', 'queue_overflow',
          'chunk_size_exceeded', 'insufficient_audio_activity', 'session_time_limit_exceeded',
          'resource_exhausted',
        ];
        if (errTypes.includes(msg.message_type)) {
          console.error('Scribe API error:', msg);
          showToast('⚠️ Scribe: ' + formatScribeErr(msg));
          return;
        }

        // Handle both partial and committed transcripts
        const isCommitted =
          msg.message_type === 'committed_transcript' ||
          msg.message_type === 'committed_transcript_with_timestamps';
        if ((msg.message_type === 'partial_transcript' || isCommitted) && msg.text?.trim()) {
          const line = msg.text.trim();

          if (msg.message_type === 'partial_transcript') {
            state.lastPartial = line;
            updateTranscriptPreview(line, true);
          } else {
            state.transcriptLines.push(line);
            state.lastCommittedAt = Date.now();
            state.lastPartial = '';
            updateTranscriptPreview(line, false);
            statLines.textContent = state.transcriptLines.length;

            const ar = await fetch('/append', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ line }),
            });
            if (!ar.ok) console.warn('/append failed', ar.status, await ar.text());
          }
        }
      } catch (e) {
        console.warn('Scribe msg parse error:', e, event.data?.slice?.(0, 200));
      }
    };

    ws.onerror = (e) => {
      clearTimeout(sessionWait);
      console.error('Scribe error:', e);
      showToast('⚠️ Scribe connection error');
    };
    ws.onclose = () => {
      clearTimeout(sessionWait);
      console.log('Scribe closed');
    };
  } catch (err) {
    console.error('Failed to start Scribe:', err);
    showToast('⚠️ Transcription failed to start');
  }
}

// ─── Audio pump to Scribe WebSocket ──────────────────────────────────────────
function startAudioPump() {
  if (!state.mediaStream || !state.scribeSocket) return;

  const ctx = new AudioContext();
  state.audioContext = ctx;
  ctx.resume?.().catch(() => {});

  const inSr = ctx.sampleRate;
  console.log('Scribe audio: resampling', inSr, 'Hz →', SCRIBE_PCM_RATE, 'Hz for pcm_16000');

  const source = ctx.createMediaStreamSource(state.mediaStream);
  const processor = ctx.createScriptProcessor(4096, 1, 1);

  source.connect(processor);
  processor.connect(ctx.destination);

  processor.onaudioprocess = (e) => {
    if (state.scribeStopping) return;
    if (state.scribeSocket?.readyState !== WebSocket.OPEN) return;
    const floatIn = e.inputBuffer.getChannelData(0);
    const float16k = resampleFloat32Linear(floatIn, inSr, SCRIBE_PCM_RATE);
    const int16 = float32ToInt16(float16k);
    const u8 = new Uint8Array(int16.buffer, int16.byteOffset, int16.byteLength);
    const audio_base_64 = uint8ToBase64(u8);
    state.scribeSocket.send(JSON.stringify({
      message_type: 'input_audio_chunk',
      audio_base_64,
      commit: false,
      sample_rate: SCRIBE_PCM_RATE,
    }));
  };
}

async function stopScribeGracefully() {
  const ws = state.scribeSocket;
  if (!ws) return;
  state.scribeStopping = true;

  // If there's an in-flight partial, give VAD/commit a moment to flush it.
  const waitForCommit = () => new Promise((resolve) => {
    const start = Date.now();
    const tick = () => {
      const noPartial = !state.lastPartial;
      const committedRecently = Date.now() - (state.lastCommittedAt || 0) < 1200;
      if (noPartial && committedRecently) return resolve();
      if (Date.now() - start > 1800) return resolve(); // hard timeout
      setTimeout(tick, 120);
    };
    tick();
  });

  try {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ message_type: 'commit' }));
    }
  } catch {}

  await waitForCommit();

  try { ws.close(); } catch {}
  state.scribeSocket = null;
}

// ─── Transcript preview ───────────────────────────────────────────────────────
function updateTranscriptPreview(line, isPartial = false) {
  transcriptPreview.classList.remove('transcript-empty');
  
  // Get last 2 committed lines
  let recent = state.transcriptLines.slice(-2);
  
  if (isPartial) {
    // Show last 2 committed + the current partial
    const display = [...recent, line].join(' … ');
    transcriptPreview.textContent = display;
    transcriptPreview.style.opacity = '0.7';
  } else {
    // Show last 3 committed lines
    const display = state.transcriptLines.slice(-3).join(' … ');
    transcriptPreview.textContent = display;
    transcriptPreview.style.opacity = '1';
  }
}

// ─── Video recording (MediaRecorder → chunked upload) ─────────────────────────
function startVideoRecorder() {
  if (!state.mediaStream) return;

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
    ? 'video/webm;codecs=vp9,opus'
    : MediaRecorder.isTypeSupported('video/webm')
    ? 'video/webm'
    : 'video/mp4';

  const recorder = new MediaRecorder(state.mediaStream, {
    mimeType,
    videoBitsPerSecond: 2_000_000, // 2Mbps — good quality, reasonable size
    audioBitsPerSecond: 128_000,
  });

  state.mediaRecorder = recorder;

  recorder.ondataavailable = async (e) => {
    if (e.data && e.data.size > 0 && state.recording) {
      const form = new FormData();
      form.append('chunk', e.data, 'chunk.webm');
      try {
        const res = await fetch('/video/chunk', { method: 'POST', body: form });
        const json = await res.json();
        state.videoChunks = json.chunks ?? state.videoChunks + 1;
        statChunks.textContent = state.videoChunks;
      } catch (err) {
        console.warn('Chunk upload failed:', err);
      }
    }
  };

  // Emit chunks every 5 seconds
  recorder.start(5000);
}

// ─── START ────────────────────────────────────────────────────────────────────
async function startRecording() {
  if (!state.mediaStream) {
    showToast('⚠️ Camera not ready yet');
    return;
  }

  // Tell server to start session
  const res = await fetch('/session/start', { method: 'POST' });
  const data = await res.json();
  state.sessionId = data.sessionId;

  state.recording = true;
  state.startTime = Date.now();
  state.transcriptLines = [];
  state.videoChunks = 0;
  lastFocusLabel = null;
  focusLog = [];
  clearInterval(focusFlushTimer);
  focusFlushTimer = setInterval(() => { flushFocusLog(); }, 3000);

  // UI
  btnMain.className = 'btn-main btn-stop';
  btnMain.textContent = '■ Stop & Analyze';
  statusPill.className = 'status-pill recording';
  statusText.textContent = 'Recording';
  recBadge.classList.add('visible');
  timerBadge.classList.add('visible');
  transcriptPreview.textContent = '';
  transcriptPreview.classList.add('transcript-empty');
  transcriptPreview.textContent = 'Listening…';

  // Timer
  state.timerInterval = setInterval(() => {
    timerBadge.textContent = formatTime(Date.now() - state.startTime);
    statDur.textContent = Math.round((Date.now() - state.startTime) / 1000) + 's';
  }, 1000);

  // Start components
  startVideoRecorder();
  await startScribe();

  showToast('🔴 Recording started');
}

// ─── STOP ─────────────────────────────────────────────────────────────────────
async function stopRecording() {
  state.recording = false;

  // Stop timer
  clearInterval(state.timerInterval);
  clearInterval(focusFlushTimer);
  focusFlushTimer = null;
  await flushFocusLog();

  // Stop MediaRecorder (flush final chunk)
  if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
    await new Promise(resolve => {
      state.mediaRecorder.onstop = resolve;
      state.mediaRecorder.stop();
    });
  }

  // Flush last segment then close Scribe (avoid cutting off final words)
  await stopScribeGracefully();

  // Close audio context
  if (state.audioContext) {
    await state.audioContext.close().catch(() => {});
    state.audioContext = null;
  }

  // UI → loading
  recBadge.classList.remove('visible');
  timerBadge.classList.remove('visible');
  statusPill.className = 'status-pill';
  statusText.textContent = 'Processing…';
  btnMain.disabled = true;
  loadingTitle.textContent = 'Analyzing with AI…';
  loadingSub.textContent = 'Saving video, chart + SOAP (Gemini)…';
  loadingOverlay.classList.add('visible');

  try {
    // Give MediaRecorder a moment to flush uploads
    await new Promise(r => setTimeout(r, 1500));

    const res = await fetch('/session/stop', { method: 'POST' });
    const result = await res.json();

    loadingOverlay.classList.remove('visible');

    if (result.patientChart) {
      showToast('✅ Analysis complete — check the dashboard!', 5000);
    } else {
      showToast('⚠️ Saved, but AI analysis failed: ' + (result.analysisError ?? 'unknown'), 6000);
    }

    // Redirect to dashboard after a moment
    setTimeout(() => {
      window.location.href = '/dashboard.html';
    }, 2000);

  } catch (err) {
    loadingOverlay.classList.remove('visible');
    showToast('⚠️ Error stopping session: ' + err.message);
  }

  // Reset UI
  btnMain.className = 'btn-main btn-start';
  btnMain.textContent = '▶ Start Recording';
  btnMain.disabled = false;
  statusPill.className = 'status-pill ready';
  statusText.textContent = 'Ready';
}

// ─── Main button ──────────────────────────────────────────────────────────────
btnMain.addEventListener('click', async () => {
  if (state.recording) {
    await stopRecording();
  } else {
    await startRecording();
  }
});

// ─── Settings (placeholder) ───────────────────────────────────────────────────
document.getElementById('btn-settings').addEventListener('click', () => {
  showToast('⚙️ Settings coming soon');
});

// ─── Keep screen awake during recording ───────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) { /* ignore */ }
  }
}
requestWakeLock();

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await initCamera();
  statusPill.className = 'status-pill ready';
  statusText.textContent = 'Ready';
}

init();
</script>
