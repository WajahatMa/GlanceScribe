<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GlanceScribe — Record</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700&family=Montserrat:wght@600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #090e0e;
    --surface: #0b1414;
    --surface2: #0e1b1b;
    --border: rgba(240,240,240,0.10);
    --text: #f0f0f0;
    --muted: #4a6060;
    --accent: #0d9488;
    --accent2: #22c7b8;
    --red: #ff4d6d;
    --green: #34d399;
    --amber: #fbbf24;
    --glow: rgba(13,148,136,0.45);
    --glow-strong: rgba(13,148,136,0.75);
    --clickable-grad-a: rgba(13,148,136,0.95);
    --clickable-grad-b: rgba(34,199,184,0.85);
    /* Recording card (reference UI) */
    --rec-bg: #1a1a1f;
    --rec-surface: #242429;
    --rec-border: rgba(255, 255, 255, 0.08);
    --rec-text: #e8e8ec;
    --rec-muted: #888888;
    --rec-red: #e84040;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
    padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px) 16px;
    gap: 12px;
    height: 100dvh;
  }

  /* Clickable effect (teal) — skip circular record / ctrl chrome */
  button, a, .camera-wrap { -webkit-tap-highlight-color: transparent; }
  button:not(.rec-btn), a { transition: all 450ms ease-in-out; }
  button:not(.rec-btn):focus-visible, a:focus-visible {
    outline: none;
    box-shadow:
      inset 0px 1px 0px 0px rgba(240,240,240,0.10),
      inset 0px -4px 0px 0px rgba(0,0,0,0.28),
      0px 0px 0px 4px rgba(13,148,136,0.18),
      0px 0px 44px 0px var(--glow);
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0;
    flex-shrink: 0;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }
  .gs-mark { width: 20px; height: 20px; display: block; }
  .gs-mark .gs-mark-pencil-body { fill: #f4c430; }
  .gs-mark .gs-mark-pencil-cap { fill: #e8a8bd; }
  .gs-mark .gs-mark-ekg { fill: none; stroke: #ef4444; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .logo-text {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .logo-text span { color: var(--accent2); }

  .dash-btn {
    height: 30px;
    padding: 0 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    transition: all 450ms ease-in-out;
    white-space: nowrap;
  }
  .dash-btn:hover, .dash-btn:focus-visible {
    background: linear-gradient(0deg, rgba(13,148,136,0.28), rgba(34,199,184,0.18));
    box-shadow:
      inset 0px 1px 0px 0px rgba(240,240,240,0.12),
      inset 0px -4px 0px 0px rgba(0,0,0,0.28),
      0px 0px 0px 4px rgba(13,148,136,0.14),
      0px 0px 44px 0px var(--glow);
    transform: translateY(-2px);
  }
  .dash-btn:active { transform: translateY(0px); }

  /* Bottom strip: ~75% transcript | ~25% duration + record (camera stays full-width above) */
  .record-layout {
    display: flex;
    flex: 1;
    min-height: 0;
    gap: 12px;
    align-items: stretch;
  }

  .record-left {
    flex: 3;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  .record-right {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    gap: 14px;
    padding: 0 0 0 4px;
  }

  /* Recording card — same structure & styles as reference snippet */
  .rec-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    flex: 1;
    min-height: 0;
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    margin-inline: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  .rec-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 28px;
  }

  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--rec-red);
    opacity: 0.25;
    transition: opacity 0.2s;
  }

  .recording .wave-bar {
    opacity: 1;
    animation: wave 0.9s ease-in-out infinite;
  }

  @keyframes wave {
    0%, 100% { transform: scaleY(0.3); }
    50% { transform: scaleY(1); }
  }

  .wave-bar:nth-child(1)  { height: 10px; animation-delay: 0s; }
  .wave-bar:nth-child(2)  { height: 18px; animation-delay: 0.07s; }
  .wave-bar:nth-child(3)  { height: 28px; animation-delay: 0.14s; }
  .wave-bar:nth-child(4)  { height: 36px; animation-delay: 0.21s; }
  .wave-bar:nth-child(5)  { height: 40px; animation-delay: 0.28s; }
  .wave-bar:nth-child(6)  { height: 32px; animation-delay: 0.35s; }
  .wave-bar:nth-child(7)  { height: 24px; animation-delay: 0.42s; }
  .wave-bar:nth-child(8)  { height: 38px; animation-delay: 0.49s; }
  .wave-bar:nth-child(9)  { height: 28px; animation-delay: 0.42s; }
  .wave-bar:nth-child(10) { height: 20px; animation-delay: 0.35s; }
  .wave-bar:nth-child(11) { height: 30px; animation-delay: 0.28s; }
  .wave-bar:nth-child(12) { height: 38px; animation-delay: 0.21s; }
  .wave-bar:nth-child(13) { height: 40px; animation-delay: 0.14s; }
  .wave-bar:nth-child(14) { height: 32px; animation-delay: 0.07s; }
  .wave-bar:nth-child(15) { height: 18px; animation-delay: 0s; }
  .wave-bar:nth-child(16) { height: 10px; animation-delay: 0.07s; }

  .timer {
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    line-height: 1.1;
  }

  .rec-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--rec-red);
    margin-right: 6px;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .recording .rec-dot {
    opacity: 1;
    animation: blink 1.2s ease-in-out infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .rec-btn {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.15s, background 0.2s;
    position: relative;
    background: var(--rec-red);
    outline: none;
    -webkit-tap-highlight-color: transparent;
  }

  .rec-btn:hover:not(:disabled) { transform: scale(1.06); }
  .rec-btn:active:not(:disabled) { transform: scale(0.96); }

  .rec-btn:disabled {
    opacity: 0.65;
    cursor: not-allowed;
    transform: none;
    pointer-events: none;
  }

  .rec-btn .ring {
    position: absolute;
    inset: -5px;
    border-radius: 50%;
    border: 1.5px solid rgba(232, 64, 64, 0.3);
    pointer-events: none;
  }

  .recording .rec-btn .ring {
    animation: pulse-ring 1.4s ease-out infinite;
  }

  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.45); opacity: 0; }
  }

  .icon-mic,
  .icon-stop {
    width: 26px;
    height: 26px;
    fill: #fff;
  }

  @media (max-width: 720px) {
    .record-layout {
      flex-direction: column;
    }
    .record-right {
      flex-direction: row;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      padding: 0;
      gap: 10px;
    }
    .record-right .rec-card {
      flex: 1;
      min-width: 0;
      width: auto;
    }
  }

  /* Camera preview — larger share of viewport + taller cap vs bottom strip */
  .camera-wrap {
    flex: 2;
    min-height: 0;
    background: #000; /* letterbox background when using object-fit: contain */
    border-radius: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
    position: relative;
    cursor: pointer; /* tap / click to turn on preview before recording (iOS needs a gesture) */
    max-height: min(72vh, 85dvh);
    aspect-ratio: 3 / 4;
  }

  #preview {
    width: 100%;
    height: 100%;
    /* Show full frame (no crop). This may letterbox but avoids "zoomed in" look. */
    object-fit: contain;
    display: block;
    /* Un-mirror camera preview (some browsers show front-cam mirrored by default). */
    transform: scaleX(-1);
  }

  /* Real-time body part overlay (MoveNet) */
  #pose-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 3;
    /* Keep labels readable; we mirror coordinates in JS when needed */
    transform: none;
  }

  .camera-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 4;
  }

  /* Corner brackets */
  .corner {
    position: absolute;
    width: 20px;
    height: 20px;
    border-color: rgba(13, 148, 136, 0.65);
    border-style: solid;
  }
  .corner.tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; border-radius: 4px 0 0 0; }
  .corner.tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; border-radius: 0 4px 0 0; }
  .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; border-radius: 0 0 0 4px; }
  .corner.br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; border-radius: 0 0 4px 0; }

  .rec-badge {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--red);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    padding: 3px 10px;
    border-radius: 4px;
    display: none;
  }

  .rec-badge.visible { display: block; }

  .timer-badge {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.6);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    padding: 4px 12px;
    border-radius: 20px;
    display: none;
    backdrop-filter: blur(8px);
  }

  .timer-badge.visible { display: block; }

  /* Transcript preview (left ~75% of bottom row) */
  .transcript-wrap {
    flex: 1;
    min-height: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .transcript-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
    flex-shrink: 0;
  }

  #transcript-preview {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  .transcript-empty { color: var(--muted); font-style: italic; }

  /* Controls */
  .controls {
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn-icon {
    width: 58px;
    height: 58px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: var(--surface);
    color: var(--muted);
    font-size: 22px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.2s;
  }

  .btn-icon:hover, .btn-icon:focus-visible {
    background: linear-gradient(0deg, rgba(13,148,136,0.22), rgba(34,199,184,0.16));
    border-color: rgba(240,240,240,0.18);
    box-shadow:
      inset 0px 1px 0px 0px rgba(240,240,240,0.12),
      inset 0px -4px 0px 0px rgba(0,0,0,0.28),
      0px 0px 0px 4px rgba(13,148,136,0.14),
      0px 0px 44px 0px var(--glow);
    transform: translateY(-2px);
    color: var(--text);
  }
  .btn-icon:active { transform: scale(0.95); background: var(--surface2); }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    justify-content: center;
  }

  .stat {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    text-align: center;
  }

  .stat-val {
    font-size: 15px;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }

  .stat-label {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .stat.stat-only {
    flex: 0 1 auto;
    min-width: 120px;
    max-width: 200px;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: calc(env(safe-area-inset-bottom, 16px) + 80px);
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 13px;
    padding: 10px 18px;
    border-radius: 20px;
    opacity: 0;
    transition: all 0.3s;
    white-space: nowrap;
    z-index: 100;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Loading overlay — scribing animation on dark scrim */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.88);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 22px;
    z-index: 200;
    display: none;
    backdrop-filter: blur(8px);
  }

  .loading-overlay.visible { display: flex; }

  .scribe-loader {
    width: min(92vw, 300px);
  }

  .scribe-paper-inner {
    position: relative;
    z-index: 1;
    min-height: 108px;
    padding: 8px 0 20px;
  }

  .scribe-ink-svg {
    position: relative;
    z-index: 1;
    width: 100%;
    height: auto;
    display: block;
    overflow: visible;
  }

  .scribe-ink-path {
    fill: none;
    stroke: var(--accent2);
    stroke-width: 2.35;
    stroke-linecap: round;
    stroke-linejoin: round;
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    filter: drop-shadow(0 0 8px rgba(34, 199, 184, 0.45));
    animation: scribe-ink 2.5s ease-in-out infinite alternate;
  }

  @keyframes scribe-ink {
    0% { stroke-dashoffset: 1; opacity: 0.45; }
    12% { opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 1; }
  }

  .scribe-pencil {
    position: absolute;
    z-index: 2;
    left: 0;
    top: 0;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.28));
    transform-origin: 75% 85%;
    will-change: transform;
  }

  .scribe-pencil svg {
    display: block;
  }

  @media (prefers-reduced-motion: reduce) {
    .scribe-ink-path { animation: none; stroke-dashoffset: 0; opacity: 0.9; }
    .scribe-pencil { transform: translate(180px, 56px) rotate(-10deg); }
  }

  .loading-text {
    font-size: 17px;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
    text-align: center;
    padding: 0 12px;
    line-height: 1.4;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="logo">
    <div class="logo-icon" aria-hidden="true">
      <svg class="gs-mark" viewBox="0 0 24 24" role="img" focusable="false" aria-label="GlanceScribe logo">
        <path class="gs-mark-pencil-body" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/>
        <path class="gs-mark-pencil-cap" d="M20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
        <path class="gs-mark-ekg" d="M7.5 18.2h2.4l1 1.7 1.4-3.1 1.8 4.5 1-1.7H22.5"/>
      </svg>
    </div>
    <div class="logo-text">Glance<span>Scribe</span></div>
  </div>
  <div class="header-right">
    <a class="dash-btn" href="/dashboard.html">Dashboard</a>
  </div>
</div>

<div class="camera-wrap" id="camera-wrap" role="button" tabindex="0" aria-label="Camera preview — tap to enable if black">
  <video id="preview" autoplay playsinline muted></video>
  <canvas id="pose-canvas"></canvas>
  <div class="camera-overlay">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="rec-badge" id="rec-badge">● REC</div>
    <div class="timer-badge" id="timer-badge">00:00</div>
  </div>
</div>

<div class="record-layout">
  <div class="record-left">
    <div class="transcript-wrap">
      <div class="transcript-label">Live Transcript</div>
      <div id="transcript-preview" class="transcript-empty">Transcript will appear here during recording…</div>
    </div>
  </div>
  <aside class="record-right" aria-label="Recording controls">
    <div class="rec-card" id="card">
      <div class="rec-label">
        <span class="rec-dot" id="dot" aria-hidden="true"></span>
        <span id="status-text" aria-live="polite">ready to record</span>
      </div>

      <div class="waveform" id="wave">
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div><div class="wave-bar"></div><div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>

      <div class="timer" id="timer">0:00</div>

      <button type="button" class="rec-btn" id="recBtn" aria-label="Start recording">
        <div class="ring"></div>
        <svg class="icon-mic" id="iconMic" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-6.5 10a6.5 6.5 0 0 0 13 0h1.5a8 8 0 0 1-7.25 7.94V21h-1.5v-2.06A8 8 0 0 1 4 11h1.5z"/>
        </svg>
        <svg class="icon-stop" id="iconStop" viewBox="0 0 24 24" style="display:none" aria-hidden="true">
          <rect x="5" y="5" width="14" height="14" rx="2"/>
        </svg>
      </button>

</div>
  </aside>
</div>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div class="scribe-loader" aria-hidden="true">
    <div class="scribe-paper-inner">
      <svg class="scribe-ink-svg" id="scribe-ink-svg" viewBox="0 0 280 100" preserveAspectRatio="xMidYMid meet" focusable="false">
        <path
          class="scribe-ink-path"
          id="scribe-ink-path"
          pathLength="1"
          d="M 14 58 C 38 52, 52 68, 78 60 C 98 54, 112 66, 132 56 C 152 46, 168 62, 190 54 C 210 46, 228 58, 252 52 C 262 50, 268 54, 274 52"
        />
      </svg>
      <div class="scribe-pencil" id="scribe-pencil" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="36" height="36" aria-hidden="true">
          <path fill="#f4c430" d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25z"/>
          <path fill="#e8a8bd" d="M20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
          <path fill="none" stroke="#c2410c" stroke-width="1.2" stroke-linecap="round" d="M8 19.5l2.2-2.1"/>
        </svg>
      </div>
    </div>
  </div>
  <p class="loading-text" role="status" aria-live="polite">Scribing...</p>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Optional: client-side ML pose (MoveNet) for real-time body-part keypoints -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.3/dist/pose-detection.min.js"></script>

<script>
// ─── State ────────────────────────────────────────────────────────────────────
const state = {
  recording: false,
  mediaStream: null,
  mediaRecorder: null,
  scribeSocket: null,
  audioContext: null,
  scribeStopping: false,
  lastPartial: '',
  lastCommittedAt: 0,
  timerInterval: null,
  statsInterval: null,
  startTime: null,
  transcriptLines: [],
  videoChunks: 0,
  facingMode: 'environment', // back camera by default for Meta glasses scenario
  sessionId: null,
};

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const preview = document.getElementById('preview');
const cameraWrap = document.getElementById('camera-wrap');
const card = document.getElementById('card');
const wave = document.getElementById('wave');
const recBtn = document.getElementById('recBtn');
const iconMic = document.getElementById('iconMic');
const iconStop = document.getElementById('iconStop');
const timerEl = document.getElementById('timer');
const statusText = document.getElementById('status-text');
const recBadge = document.getElementById('rec-badge');
const timerBadge = document.getElementById('timer-badge');
const transcriptPreview = document.getElementById('transcript-preview');
const loadingOverlay = document.getElementById('loading-overlay');
const toast = document.getElementById('toast');
const poseCanvas = document.getElementById('pose-canvas');

// ─── Scribe loader motion (pencil tip follows ink path) ───────────────────────
const prefersReducedMotion = window.matchMedia?.('(prefers-reduced-motion: reduce)')?.matches ?? false;
const scribeSvg = document.getElementById('scribe-ink-svg');
const scribePath = document.getElementById('scribe-ink-path');
const scribePencil = document.getElementById('scribe-pencil');
let scribeRaf = null;
let scribeStart = 0;

function stopScribeMotion() {
  if (scribeRaf) cancelAnimationFrame(scribeRaf);
  scribeRaf = null;
}

function startScribeMotion() {
  if (prefersReducedMotion) return;
  if (!scribeSvg || !scribePath || !scribePencil) return;

  stopScribeMotion();
  scribeStart = performance.now();

  const totalLen = scribePath.getTotalLength();
  const pencilW = 36;
  const pencilH = 36;

  const tick = (now) => {
    if (!loadingOverlay.classList.contains('visible')) {
      stopScribeMotion();
      return;
    }

    // Match CSS: 2.5s, alternate (forward then backward)
    const D = 2500;
    const t = (now - scribeStart) % (D * 2);
    const forward = t <= D;
    const p = (t % D) / D; // 0..1
    const prog = forward ? p : (1 - p);

    // Convert point to pixels in page space, then to local coords of paper-inner
    const len = totalLen * prog;
    const pt = scribePath.getPointAtLength(len);
    const pt2 = scribePath.getPointAtLength(Math.min(totalLen, len + 0.75));

    const ctm = scribeSvg.getScreenCTM();
    if (ctm) {
      const p1 = scribeSvg.createSVGPoint();
      p1.x = pt.x; p1.y = pt.y;
      const p2 = scribeSvg.createSVGPoint();
      p2.x = pt2.x; p2.y = pt2.y;
      const s1 = p1.matrixTransform(ctm);
      const s2 = p2.matrixTransform(ctm);

      const inner = scribeSvg.closest('.scribe-paper-inner');
      const rInner = inner?.getBoundingClientRect();
      if (rInner) {
        const x = (s1.x - rInner.left);
        const y = (s1.y - rInner.top);
        const dx = (s2.x - s1.x);
        const dy = (s2.y - s1.y);
        const ang = Math.atan2(dy, dx) * (180 / Math.PI);

        // Offset so the “tip” sits on the line; tuned for this 24x24 pencil icon.
        const offX = -pencilW * 0.72;
        const offY = -pencilH * 0.20;
        scribePencil.style.transform = `translate(${x + offX}px, ${y + offY}px) rotate(${ang + 18}deg)`;
      }
    }

    scribeRaf = requestAnimationFrame(tick);
  };

  scribeRaf = requestAnimationFrame(tick);
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, duration = 3000) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
}

// ─── Camera init ──────────────────────────────────────────────────────────────
async function initCamera() {
  try {
    if (state.mediaStream) {
      state.mediaStream.getTracks().forEach(t => t.stop());
    }
    state.mediaStream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: state.facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: { echoCancellation: false, noiseSuppression: false, sampleRate: 16000 },
    });
    preview.srcObject = state.mediaStream;
    // Force an un-mirrored preview (counteracts default mirrored camera behavior).
    preview.style.transform = 'scaleX(-1)';
    await preview.play().catch(() => {});
    initBodyDetection().catch(() => {});
  } catch (err) {
    state.mediaStream = null;
    showToast('⚠️ Camera access denied: ' + err.message);
    console.error(err);
  }
}

// Live preview before recording: warm camera on load; on strict browsers (e.g. iOS) tap the frame once.
async function warmPreviewIfIdle() {
  if (state.recording || state.mediaStream) return;
  await initCamera();
}
cameraWrap.addEventListener('click', () => { warmPreviewIfIdle(); });
cameraWrap.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' || e.key === ' ') {
    e.preventDefault();
    warmPreviewIfIdle();
  }
});

// ─── Real-time body-part detection (MoveNet via TF.js) ────────────────────────
const BODY_PARTS = {
  nose: 'Head',
  left_elbow: 'Left Elbow',
  right_elbow: 'Right Elbow',
  left_wrist: 'Left Hand',
  right_wrist: 'Right Hand',
  left_knee: 'Left Knee',
  right_knee: 'Right Knee',
  left_ankle: 'Left Foot',
  right_ankle: 'Right Foot',
};

let poseDetector = null;
let poseLoopToken = 0;
let lastFocusLabel = null;
let focusLog = [];
let focusFlushTimer = null;

function drawBodyParts(ctx, keypoints, w, h, map) {
  ctx.clearRect(0, 0, w, h);
  // Pick a single "focused" keypoint each frame.
  // Prefer limbs over the head: if any elbow/wrist/knee/ankle is confident enough,
  // the head (nose) is not eligible for focus — fixes "elbow in frame but head wins".
  let focusedName = null;
  let focusedScore = -1;
  const cx = w / 2;
  const cy = h / 2;
  const maxD = Math.max(1, Math.hypot(cx, cy));
  const candidates = [];
  for (const kp of keypoints ?? []) {
    if (!BODY_PARTS[kp.name]) continue;
    const s = kp.score ?? 0;
    if (s < 0.3) continue;
    const kx = map?.flipX ? (map.videoW - kp.x) : kp.x;
    const ky = kp.y;
    const px = map ? (kx * map.scale + map.offX) : kx;
    const py = map ? (ky * map.scale + map.offY) : ky;
    const dx = (px ?? 0) - cx;
    const dy = (py ?? 0) - cy;
    const centered = 1 - Math.min(1, Math.hypot(dx, dy) / maxD); // 0..1
    const partBoost =
      kp.name === 'left_wrist' || kp.name === 'right_wrist'
        ? 0.18
        : (kp.name === 'left_elbow' || kp.name === 'right_elbow')
          ? 0.16
          : (kp.name === 'left_knee' || kp.name === 'right_knee' || kp.name === 'left_ankle' || kp.name === 'right_ankle')
            ? 0.10
            : 0;
    const conf = Math.min(1, s);
    const rank = centered + partBoost + conf * 0.08;
    candidates.push({ name: kp.name, rank });
  }
  const limbNames = new Set([
    'left_elbow', 'right_elbow', 'left_wrist', 'right_wrist',
    'left_knee', 'right_knee', 'left_ankle', 'right_ankle',
  ]);
  const hasLimb = candidates.some((c) => limbNames.has(c.name));
  const pool = hasLimb ? candidates.filter((c) => c.name !== 'nose') : candidates;
  for (const c of pool) {
    if (c.rank > focusedScore) {
      focusedScore = c.rank;
      focusedName = c.name;
    }
  }

  // Capture focus changes during an active recording session.
  if (state.recording && focusedName) {
    const focusedLabel = BODY_PARTS[focusedName] ?? null;
    if (focusedLabel && focusedLabel !== lastFocusLabel) {
      lastFocusLabel = focusedLabel;
      const tMs = state.startTime ? (Date.now() - state.startTime) : 0;
      focusLog.push({
        t_ms: Math.max(0, Math.round(tMs)),
        keypoint: focusedName,
        label: focusedLabel,
        rank: Math.round(focusedScore * 1000) / 1000,
      });
    }
  }

  for (const kp of keypoints ?? []) {
    const label = BODY_PARTS[kp.name];
    if (!label) continue;
    if ((kp.score ?? 0) < 0.3) continue;

    const kx = map?.flipX ? (map.videoW - kp.x) : kp.x;
    const ky = kp.y;
    const x = map ? (kx * map.scale + map.offX) : kx;
    const y = map ? (ky * map.scale + map.offY) : ky;
    const r = 18;

    const isFocused = kp.name === focusedName;
    ctx.strokeStyle = isFocused ? '#ff3b30' : '#00FF88';
    ctx.lineWidth = isFocused ? 3 : 2;
    ctx.strokeRect(x - r, y - r, r * 2, r * 2);

    // Label pill
    ctx.font = 'bold 12px system-ui, -apple-system, sans-serif';
    const pad = 6;
    const label2 = isFocused ? `${label} (focus)` : label;
    const tw = ctx.measureText(label2).width;
    const bw = tw + pad * 2;
    const bh = 18;
    const bx = Math.max(4, Math.min(w - bw - 4, x - r));
    const by = Math.max(4, y - r - bh - 4);

    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = isFocused ? '#ff3b30' : '#00FF88';
    ctx.fillText(label2, bx + pad, by + 13);
  }
}

async function flushFocusLog() {
  if (!state.recording) return;
  if (!state.sessionId) return;
  if (!focusLog.length) return;
  const batch = focusLog;
  focusLog = [];
  try {
    await fetch('/focus', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: state.sessionId, events: batch }),
    });
  } catch {
    // If it fails (offline, server restart), keep logging locally.
    focusLog = batch.concat(focusLog);
  }
}

async function initBodyDetection() {
  // Don’t crash the app if TF.js fails to load (offline, blocked CDN, etc.)
  if (!window.poseDetection || !window.tf) return;
  if (!preview) return;

  if (!poseDetector) {
    try {
      poseDetector = await poseDetection.createDetector(
        poseDetection.SupportedModels.MoveNet,
        { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
      );
    } catch (e) {
      console.warn('MoveNet init failed:', e);
      return;
    }
  }

  const token = ++poseLoopToken;
  const canvas = poseCanvas;
  const ctx = canvas.getContext('2d');

  async function tick() {
    if (token !== poseLoopToken) return;
    if (preview.readyState < 2 || preview.videoWidth === 0 || preview.videoHeight === 0) {
      requestAnimationFrame(tick);
      return;
    }

    // With object-fit: contain, the displayed video is letterboxed.
    // Draw in CSS pixels and map keypoint coords from video pixels -> displayed rect.
    const rect = canvas.getBoundingClientRect();
    const cw = Math.max(1, Math.round(rect.width));
    const ch = Math.max(1, Math.round(rect.height));
    if (canvas.width !== cw) canvas.width = cw;
    if (canvas.height !== ch) canvas.height = ch;

    const vw = preview.videoWidth;
    const vh = preview.videoHeight;
    const scale = Math.min(cw / vw, ch / vh);
    const drawW = vw * scale;
    const drawH = vh * scale;
    const offX = (cw - drawW) / 2;
    const offY = (ch - drawH) / 2;
    // Preview is flipped with CSS scaleX(-1), so mirror keypoint X to match.
    const map = { scale, offX, offY, flipX: true, videoW: vw };

    try {
      const poses = await poseDetector.estimatePoses(preview, { maxPoses: 1, flipHorizontal: false });
      if (poses?.[0]?.keypoints) {
        drawBodyParts(ctx, poses[0].keypoints, canvas.width, canvas.height, map);
      } else {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }
    } catch (e) {
      // If it fails (e.g. WebGL context loss), just stop drawing silently.
      console.warn('MoveNet estimate failed:', e);
      return;
    }

    requestAnimationFrame(tick);
  }

  requestAnimationFrame(tick);
}

// ─── Timer ────────────────────────────────────────────────────────────────────
function formatTime(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return `${String(m).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

/** Card timer display (matches reference: m:ss) */
function formatTimerCard(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  return m + ':' + String(s % 60).padStart(2, '0');
}

// Base64 for PCM bytes (required by ElevenLabs `input_audio_chunk`)
function uint8ToBase64(u8) {
  let bin = '';
  const chunk = 0x8000;
  for (let i = 0; i < u8.length; i += chunk) {
    bin += String.fromCharCode.apply(null, u8.subarray(i, i + chunk));
  }
  return btoa(bin);
}

/** Always stream 16 kHz mono PCM16 to Scribe (resampled in-browser if the mic runs at another rate). */
const SCRIBE_PCM_RATE = 16000;

/** Linear resample mono float32 [-1,1] from fromRate → toRate. */
function resampleFloat32Linear(input, fromRate, toRate) {
  if (fromRate === toRate || input.length === 0) return input;
  const ratio = toRate / fromRate;
  const outLen = Math.max(1, Math.round(input.length * ratio));
  const out = new Float32Array(outLen);
  for (let i = 0; i < outLen; i++) {
    const srcPos = (i + 0.5) / ratio - 0.5;
    const i0 = Math.floor(srcPos);
    const i1 = Math.min(i0 + 1, input.length - 1);
    const f = srcPos - i0;
    const a = input[Math.max(0, i0)];
    const b = input[i1];
    out[i] = a + (b - a) * f;
  }
  return out;
}

function float32ToInt16(float32) {
  const int16 = new Int16Array(float32.length);
  for (let i = 0; i < float32.length; i++) {
    int16[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32767)));
  }
  return int16;
}

function formatScribeErr(msg) {
  const e = msg?.error ?? msg?.message_type ?? 'unknown';
  return typeof e === 'string' ? e : JSON.stringify(e);
}

// ─── Scribe WebSocket ─────────────────────────────────────────────────────────
async function startScribe() {
  try {
    const res = await fetch('/scribe-token');
    if (!res.ok) {
      const t = await res.text();
      throw new Error(t || 'scribe-token failed');
    }
    const { token } = await res.json();
    if (!token) throw new Error('No token from server');

    // API expects JSON `input_audio_chunk` + base64 PCM at the rate implied by `audio_format`.
    // We always send 16 kHz (resampled from whatever the browser AudioContext uses).
    const qs = new URLSearchParams({
      token,
      model_id: 'scribe_v2_realtime',
      commit_strategy: 'vad',
      audio_format: 'pcm_16000',
    });
    const ws = new WebSocket(`wss://api.elevenlabs.io/v1/speech-to-text/realtime?${qs.toString()}`);
    state.scribeSocket = ws;
    state.scribeAudioStarted = false;
    state.scribeStopping = false;
    state.lastPartial = '';

    const sessionWait = setTimeout(() => {
      if (!state.scribeAudioStarted) {
        console.error('Scribe: no session_started within 8s');
        showToast('⚠️ Scribe: no session (check token / network)');
        try { ws.close(); } catch (_) {}
      }
    }, 8000);

    ws.onopen = () => {
      console.log('Scribe WebSocket open; waiting for session_started…');
    };

    ws.onmessage = async (event) => {
      try {
        if (typeof event.data !== 'string') return;
        const msg = JSON.parse(event.data);

        if (msg.message_type === 'session_started') {
          console.log('Scribe session:', msg.session_id, msg.config || {});
          if (!state.scribeAudioStarted) {
            state.scribeAudioStarted = true;
            clearTimeout(sessionWait);
            startAudioPump();
          }
          return;
        }

        const errTypes = [
          'error', 'auth_error', 'quota_exceeded', 'input_error', 'transcriber_error',
          'rate_limited', 'commit_throttled', 'unaccepted_terms', 'queue_overflow',
          'chunk_size_exceeded', 'insufficient_audio_activity', 'session_time_limit_exceeded',
          'resource_exhausted',
        ];
        if (errTypes.includes(msg.message_type)) {
          console.error('Scribe API error:', msg);
          showToast('⚠️ Scribe: ' + formatScribeErr(msg));
          return;
        }

        // Handle both partial and committed transcripts
        const isCommitted =
          msg.message_type === 'committed_transcript' ||
          msg.message_type === 'committed_transcript_with_timestamps';
        if ((msg.message_type === 'partial_transcript' || isCommitted) && msg.text?.trim()) {
          const line = msg.text.trim();

          if (msg.message_type === 'partial_transcript') {
            state.lastPartial = line;
            updateTranscriptPreview(line, true);
          } else {
            state.transcriptLines.push(line);
            state.lastCommittedAt = Date.now();
            state.lastPartial = '';
            updateTranscriptPreview(line, false);

            const ar = await fetch('/append', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ line }),
            });
            if (!ar.ok) console.warn('/append failed', ar.status, await ar.text());
          }
        }
      } catch (e) {
        console.warn('Scribe msg parse error:', e, event.data?.slice?.(0, 200));
      }
    };

    ws.onerror = (e) => {
      clearTimeout(sessionWait);
      console.error('Scribe error:', e);
      showToast('⚠️ Scribe connection error');
    };
    ws.onclose = () => {
      clearTimeout(sessionWait);
      console.log('Scribe closed');
    };
  } catch (err) {
    console.error('Failed to start Scribe:', err);
    showToast('⚠️ Transcription failed to start');
  }
}

// ─── Audio pump to Scribe WebSocket ──────────────────────────────────────────
function startAudioPump() {
  if (!state.mediaStream || !state.scribeSocket) return;

  const ctx = new AudioContext();
  state.audioContext = ctx;
  ctx.resume?.().catch(() => {});

  const inSr = ctx.sampleRate;
  console.log('Scribe audio: resampling', inSr, 'Hz →', SCRIBE_PCM_RATE, 'Hz for pcm_16000');

  const source = ctx.createMediaStreamSource(state.mediaStream);
  const processor = ctx.createScriptProcessor(4096, 1, 1);

  source.connect(processor);
  processor.connect(ctx.destination);

  processor.onaudioprocess = (e) => {
    if (state.scribeStopping) return;
    if (state.scribeSocket?.readyState !== WebSocket.OPEN) return;
    const floatIn = e.inputBuffer.getChannelData(0);
    const float16k = resampleFloat32Linear(floatIn, inSr, SCRIBE_PCM_RATE);
    const int16 = float32ToInt16(float16k);
    const u8 = new Uint8Array(int16.buffer, int16.byteOffset, int16.byteLength);
    const audio_base_64 = uint8ToBase64(u8);
    state.scribeSocket.send(JSON.stringify({
      message_type: 'input_audio_chunk',
      audio_base_64,
      commit: false,
      sample_rate: SCRIBE_PCM_RATE,
    }));
  };
}

async function stopScribeGracefully() {
  const ws = state.scribeSocket;
  if (!ws) return;
  state.scribeStopping = true;

  // If there's an in-flight partial, give VAD/commit a moment to flush it.
  const waitForCommit = () => new Promise((resolve) => {
    const start = Date.now();
    const tick = () => {
      const noPartial = !state.lastPartial;
      const committedRecently = Date.now() - (state.lastCommittedAt || 0) < 1200;
      if (noPartial && committedRecently) return resolve();
      if (Date.now() - start > 1800) return resolve(); // hard timeout
      setTimeout(tick, 120);
    };
    tick();
  });

  try {
    if (ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ message_type: 'commit' }));
    }
  } catch {}

  await waitForCommit();

  try { ws.close(); } catch {}
  state.scribeSocket = null;
}

// ─── Transcript preview ───────────────────────────────────────────────────────
function updateTranscriptPreview(line, isPartial = false) {
  transcriptPreview.classList.remove('transcript-empty');
  
  // Get last 2 committed lines
  let recent = state.transcriptLines.slice(-2);
  
  if (isPartial) {
    // Show last 2 committed + the current partial
    const display = [...recent, line].join(' … ');
    transcriptPreview.textContent = display;
    transcriptPreview.style.opacity = '0.7';
  } else {
    // Show last 3 committed lines
    const display = state.transcriptLines.slice(-3).join(' … ');
    transcriptPreview.textContent = display;
    transcriptPreview.style.opacity = '1';
  }
}

// ─── Video recording (MediaRecorder → chunked upload) ─────────────────────────
function startVideoRecorder() {
  if (!state.mediaStream) return;

  const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9,opus')
    ? 'video/webm;codecs=vp9,opus'
    : MediaRecorder.isTypeSupported('video/webm')
    ? 'video/webm'
    : 'video/mp4';

  const recorder = new MediaRecorder(state.mediaStream, {
    mimeType,
    videoBitsPerSecond: 2_000_000, // 2Mbps — good quality, reasonable size
    audioBitsPerSecond: 128_000,
  });

  state.mediaRecorder = recorder;

  recorder.ondataavailable = async (e) => {
    if (e.data && e.data.size > 0 && state.recording) {
      const form = new FormData();
      form.append('chunk', e.data, 'chunk.webm');
      try {
        const res = await fetch('/video/chunk', { method: 'POST', body: form });
        const json = await res.json();
        state.videoChunks = json.chunks ?? state.videoChunks + 1;
      } catch (err) {
        console.warn('Chunk upload failed:', err);
      }
    }
  };

  // Emit chunks every 5 seconds
  recorder.start(5000);
}

// ─── START ────────────────────────────────────────────────────────────────────
async function startRecording() {
  // iOS Safari often requires a user gesture to grant camera permission.
  // This function runs from the Start button click, so it’s a safe place to request it.
  if (!state.mediaStream) {
    await initCamera();
    if (!state.mediaStream) {
      showToast('⚠️ Camera not ready — tap Allow Camera/Microphone when prompted');
      return;
    }
  }

  // Tell server to start session
  const res = await fetch('/session/start', { method: 'POST' });
  const data = await res.json();
  state.sessionId = data.sessionId;

  state.recording = true;
  state.startTime = Date.now();
  state.transcriptLines = [];
  state.videoChunks = 0;
  lastFocusLabel = null;
  focusLog = [];
  clearInterval(focusFlushTimer);
  focusFlushTimer = setInterval(() => { flushFocusLog(); }, 3000);

  // UI
  if (card) card.classList.add('recording');
  if (wave) wave.classList.add('recording');
  if (iconMic) iconMic.style.display = 'none';
  if (iconStop) iconStop.style.display = 'block';
  if (statusText) statusText.textContent = 'recording';
  if (timerEl) timerEl.textContent = formatTimerCard(0);
  recBtn.setAttribute('aria-label', 'Stop and analyze');
  recBadge.classList.add('visible');
  timerBadge.classList.add('visible');
  transcriptPreview.textContent = '';
  transcriptPreview.classList.add('transcript-empty');
  transcriptPreview.textContent = 'Listening…';

  // Timer
  state.timerInterval = setInterval(() => {
    const elapsed = Date.now() - state.startTime;
    timerBadge.textContent = formatTime(elapsed);
    if (timerEl) timerEl.textContent = formatTimerCard(elapsed);
  }, 1000);

  // Start components
  startVideoRecorder();
  await startScribe();

  showToast('🔴 Recording started');
}

// ─── STOP ─────────────────────────────────────────────────────────────────────
async function stopRecording() {
  state.recording = false;

  // Stop timer
  clearInterval(state.timerInterval);
  clearInterval(focusFlushTimer);
  focusFlushTimer = null;
  await flushFocusLog();

  // Stop MediaRecorder (flush final chunk)
  if (state.mediaRecorder && state.mediaRecorder.state !== 'inactive') {
    await new Promise(resolve => {
      state.mediaRecorder.onstop = resolve;
      state.mediaRecorder.stop();
    });
  }

  // Flush last segment then close Scribe (avoid cutting off final words)
  await stopScribeGracefully();

  // Close audio context
  if (state.audioContext) {
    await state.audioContext.close().catch(() => {});
    state.audioContext = null;
  }

  // UI → loading (card back to idle while overlay runs)
  if (card) card.classList.remove('recording');
  if (wave) wave.classList.remove('recording');
  if (iconMic) iconMic.style.display = 'block';
  if (iconStop) iconStop.style.display = 'none';
  if (statusText) statusText.textContent = 'ready to record';
  if (timerEl) timerEl.textContent = '0:00';
  recBadge.classList.remove('visible');
  timerBadge.classList.remove('visible');
  recBtn.disabled = true;
  if (statusText) statusText.textContent = 'Processing…';
  loadingOverlay.classList.add('visible');
  startScribeMotion();

  try {
    // Give MediaRecorder a moment to flush uploads
    await new Promise(r => setTimeout(r, 1500));

    const res = await fetch('/session/stop', { method: 'POST' });
    const result = await res.json();

    loadingOverlay.classList.remove('visible');
    stopScribeMotion();

    if (result.patientChart) {
      showToast('✅ Analysis complete — check the dashboard!', 5000);
    } else {
      showToast('⚠️ Saved, but AI analysis failed: ' + (result.analysisError ?? 'unknown'), 6000);
    }

    // Redirect to dashboard after a moment
    setTimeout(() => {
      window.location.href = '/dashboard.html';
    }, 2000);

  } catch (err) {
    loadingOverlay.classList.remove('visible');
    stopScribeMotion();
    showToast('⚠️ Error stopping session: ' + err.message);
  }

  recBtn.setAttribute('aria-label', 'Start recording');
  recBtn.disabled = false;
}

// ─── Main button ──────────────────────────────────────────────────────────────
recBtn.addEventListener('click', async () => {
  if (state.recording) {
    await stopRecording();
  } else {
    // Ensure camera permission is requested from a user gesture on iOS.
    if (!state.mediaStream) await initCamera();
    await startRecording();
  }
});

// ─── Keep screen awake during recording ───────────────────────────────────────
let wakeLock = null;
async function requestWakeLock() {
  if ('wakeLock' in navigator) {
    try {
      wakeLock = await navigator.wakeLock.request('screen');
    } catch (e) { /* ignore */ }
  }
}
requestWakeLock();

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  await initCamera();
}

init();
</script>
