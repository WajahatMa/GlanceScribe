<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>GlanceScribe — Camera</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; color: #fff; font-family: 'Helvetica Neue', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1.5rem; }
  h1 { font-size: 18px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #666; margin-bottom: 2rem; }
  video { width: 100%; max-width: 400px; border-radius: 12px; background: #111; aspect-ratio: 4/3; object-fit: cover; display: block; margin-bottom: 1rem; }
  .status { font-size: 13px; color: #666; display: flex; align-items: center; gap: 8px; margin-bottom: 1.5rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: #444; flex-shrink: 0; }
  .dot.green { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .dot.amber { background: #fbbf24; box-shadow: 0 0 6px #fbbf24; }
  .btn { width: 100%; max-width: 400px; padding: 14px; border: 1px solid #333; border-radius: 10px; background: transparent; color: #fff; font-size: 15px; cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s; }
  .btn:hover { background: #1a1a1a; }
  .btn:disabled { opacity: 0.3; cursor: default; }
  .fps { font-size: 12px; color: #444; margin-top: 0.75rem; }
</style>
</head>
<body>
  <h1>GlanceScribe</h1>
  <p class="sub">Camera sender</p>
  <video id="video" autoplay playsinline muted></video>
  <div class="status"><div class="dot" id="dot"></div><span id="status">Connecting to server...</span></div>
  <button class="btn" id="btn" onclick="startCamera()" disabled>Start camera</button>
  <p class="fps" id="fps"></p>

<script>
const proto = location.protocol === 'https:' ? 'wss' : 'ws';
const wsHost = location.protocol === 'https:' ? location.hostname : location.hostname + ':3000';
const ws = new WebSocket(proto + '://' + wsHost);
let stream, frameCount = 0;

ws.onopen = () => {
  ws.send(JSON.stringify({ type: 'register', role: 'sender' }));
  setStatus('amber', 'Waiting for receiver...');
};

ws.onmessage = (e) => {
  const msg = JSON.parse(e.data);
  if (msg.type === 'receiver-ready') {
    setStatus('amber', 'Receiver ready — tap Start camera');
    document.getElementById('btn').disabled = false;
  }
};

ws.onerror = () => setStatus('', 'Connection error');

async function startCamera() {
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = 'Starting...';
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: 640, height: 480 }, audio: false });
    document.getElementById('video').srcObject = stream;
    setStatus('green', 'Streaming frames to computer');
    document.getElementById('btn').textContent = 'Streaming...';
    startSending();
  } catch(e) {
    setStatus('', 'Camera error: ' + e.message);
    document.getElementById('btn').disabled = false;
    document.getElementById('btn').textContent = 'Try again';
  }
}

function startSending() {
  const video = document.getElementById('video');
  const canvas = document.createElement('canvas');
  canvas.width = 640; canvas.height = 480;
  const ctx = canvas.getContext('2d');

  setInterval(() => {
    if (ws.readyState !== WebSocket.OPEN) return;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const b64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
    ws.send(JSON.stringify({ type: 'frame', data: b64 }));
    frameCount++;
    document.getElementById('fps').textContent = 'Frames sent: ' + frameCount;
  }, 4000);
}

function setStatus(color, text) {
  document.getElementById('dot').className = 'dot ' + color;
  document.getElementById('status').textContent = text;
}
</script>
</body>
</html>
